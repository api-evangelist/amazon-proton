aid: amazon-proton
name: Amazon Proton
description: >-
  AWS Proton is a managed service for platform engineers that helps them
  publish standardized container and serverless application templates to empower
  developers. It provides automated infrastructure provisioning and manages
  deployment pipelines for all your applications.
