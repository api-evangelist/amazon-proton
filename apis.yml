name: Amazon Proton
description: AWS Proton is a managed service for platform engineers that helps them publish standardized container and serverless application templates to empower developers. It provides automated 
  infrastructure provisioning and manages deployment pipelines for all your applications, enabling self-service developer workflows with platform-team guardrails.
url: https://raw.githubusercontent.com/api-evangelist/amazon-proton/refs/heads/main/apis.yml
type: Index
image: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
tags:
- AWS
- DevOps
- Infrastructure as Code
- Platform Engineering
- Serverless
- Templates
- Self-Service
- CI/CD
created: '2026-03-16'
modified: '2026-04-19'
apis:
- name: AWS Proton API
  description: The AWS Proton API provides programmatic access to create and manage environment templates, service templates, environments, services, components, and deployment pipelines for 
    standardized application deployments with automated infrastructure provisioning.
  humanURL: https://aws.amazon.com/proton/
